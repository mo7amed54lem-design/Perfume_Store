<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العطور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: 0.3s; border-radius: 15px; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container my-5">
        <h2 class="text-center mb-5">عطورنا المميزة</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card h-100 product-card shadow-sm text-center p-3">
                    <img src="https://via.placeholder.com/200x250?text=Perfume" class="card-img-top mx-auto" style="width: 150px;" alt="Perfume">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">عطر لودور المسك</h5>
                        <div class="text-warning mb-2">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                        <p class="text-primary fw-bold">650 EGP</p>
                        <button class="btn btn-dark w-100 rounded-pill">أضف للسلة</button>
                    </div>
                </div>
            </div>
            </div>
    </div>

</body>
</html>
